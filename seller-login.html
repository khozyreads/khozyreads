<!doctype html>
<html lang="kh">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Seller Login - KhozyReads</title><link rel="stylesheet" href="assets/style.css"></head>
<body data-page="seller-login">
  <header class="site-header">
    <a class="brand" href="seller-login.html">KhozyReads Seller</a>
    <nav class="nav"><span class="lang-switch"><button data-lang="kh">KH</button><button data-lang="en">EN</button></span></nav>
  </header>
  <main class="container">
    <section class="panel">
      <h1 data-i18n="seller">Seller</h1>
      <p data-i18n="seller_login_help">For sellers and admins only.</p>
      <form class="form" data-login-form data-staff="true">
        <label><span data-i18n="username">Username</span><input name="username" required placeholder="Username" data-i18n-placeholder="username"></label>
        <label><span data-i18n="password">Password</span><input name="password" type="password" required placeholder="Password" data-i18n-placeholder="password"></label>
        <button data-i18n="signIn">Sign In</button>
      </form>
      <p data-message></p>
    </section>
  </main>
  <script src="assets/config.js"></script>
  <script src="assets/nav-state.js"></script>
  <script src="assets/fallback-auth.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
