<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="#7B2D26"/>
  <!-- Inner safe zone (Android masks crop ~10% on each side) -->
  <g transform="translate(256,256)">
    <!-- Lotus petals -->
    <g fill="#D4A574">
      <path d="M 0 0 C -36 -42, -36 -88, 0 -130 C 36 -88, 36 -42, 0 0 Z"/>
      <path d="M 0 0 C -36 -42, -36 -88, 0 -130 C 36 -88, 36 -42, 0 0 Z" transform="rotate(45)" opacity="0.85"/>
      <path d="M 0 0 C -36 -42, -36 -88, 0 -130 C 36 -88, 36 -42, 0 0 Z" transform="rotate(-45)" opacity="0.85"/>
      <path d="M 0 0 C -36 -42, -36 -88, 0 -130 C 36 -88, 36 -42, 0 0 Z" transform="rotate(90)" opacity="0.7"/>
      <path d="M 0 0 C -36 -42, -36 -88, 0 -130 C 36 -88, 36 -42, 0 0 Z" transform="rotate(-90)" opacity="0.7"/>
    </g>
    <circle cx="0" cy="0" r="14" fill="#FAF5E9"/>
  </g>
  <!-- Brand text below lotus -->
  <text x="256" y="440" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="46" font-weight="600" fill="#FAF5E9" text-anchor="middle">KhozyReads</text>
</svg>
