<style>
  /* ===== KhozyReads — Theme ===== */
  :root {
    --kr-bg:        #f6f3ee;
    --kr-surface:   #ffffff;
    --kr-ink:       #1f1b16;
    --kr-ink-soft:  #5b5247;
    --kr-line:      #e7dfd3;
    --kr-accent:    #b1632a;
    --kr-accent-d:  #8e4d1f;
    --kr-accent-l:  #f6e3d2;
    --kr-good:      #2f7d4f;
    --kr-good-l:    #d6efdf;
    --kr-warn:      #b07b00;
    --kr-warn-l:    #fbeec5;
    --kr-bad:       #b3372a;
    --kr-bad-l:     #f8d8d3;
    --kr-shadow:    0 4px 20px rgba(60,40,20,.07);
    --kr-radius:    14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans Khmer', 'Hanuman', 'Battambang', 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    color: var(--kr-ink);
    background: var(--kr-bg);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  a { color: var(--kr-accent-d); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ===== Layout ===== */
  .kr-shell { min-height: 100vh; display: flex; flex-direction: column; }
  .kr-header {
    background: var(--kr-surface);
    border-bottom: 1px solid var(--kr-line);
    position: sticky; top: 0; z-index: 30;
  }
  .kr-header-row {
    max-width: 1100px; margin: 0 auto;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .kr-logo {
    font-weight: 800; font-size: 20px;
    background: linear-gradient(90deg, var(--kr-accent), var(--kr-accent-d));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    cursor: pointer; user-select: none;
  }
  .kr-nav { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .kr-nav button {
    background: none; border: 0; padding: 8px 12px;
    color: var(--kr-ink-soft); border-radius: 8px; cursor: pointer; font: inherit;
  }
  .kr-nav button:hover { background: var(--kr-accent-l); color: var(--kr-accent-d); }
  .kr-nav button.active { color: var(--kr-accent-d); }

  .kr-lang {
    display: inline-flex; border: 1px solid var(--kr-line); border-radius: 999px; overflow: hidden;
  }
  .kr-lang button {
    padding: 6px 12px; background: var(--kr-surface); border: 0; cursor: pointer; font: inherit;
    color: var(--kr-ink-soft);
  }
  .kr-lang button.active { background: var(--kr-accent); color: white; }

  main.kr-main { flex: 1; max-width: 1100px; margin: 0 auto; padding: 22px 18px 60px; width: 100%; }
  .kr-footer { padding: 22px; text-align: center; color: var(--kr-ink-soft); font-size: 13px; }

  /* ===== Cards / forms ===== */
  .kr-card {
    background: var(--kr-surface);
    border: 1px solid var(--kr-line);
    border-radius: var(--kr-radius);
    box-shadow: var(--kr-shadow);
    padding: 22px;
  }
  .kr-card + .kr-card { margin-top: 16px; }
  .kr-h1 { font-size: 24px; margin: 0 0 6px; }
  .kr-h2 { font-size: 18px; margin: 0 0 12px; }
  .kr-muted { color: var(--kr-ink-soft); }

  .kr-grid { display: grid; gap: 16px; }
  .kr-books { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

  .kr-book {
    background: var(--kr-surface);
    border: 1px solid var(--kr-line);
    border-radius: var(--kr-radius);
    overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column;
    transition: transform .14s ease, box-shadow .14s ease;
  }
  .kr-book:hover { transform: translateY(-2px); box-shadow: var(--kr-shadow); }
  .kr-cover {
    aspect-ratio: 3 / 4; background: var(--kr-accent-l) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--kr-accent-d); padding: 8px; text-align: center;
  }
  .kr-book-body { padding: 12px 14px 14px; }
  .kr-book-title { font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
  .kr-book-creator { font-size: 13px; color: var(--kr-ink-soft); margin-bottom: 8px; }
  .kr-price { font-weight: 700; color: var(--kr-accent-d); }

  /* ===== Buttons ===== */
  .kr-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 18px; border-radius: 10px;
    background: var(--kr-accent); color: #fff; border: 0; cursor: pointer;
    font: inherit; font-weight: 600; transition: background .15s ease;
  }
  .kr-btn:hover { background: var(--kr-accent-d); }
  .kr-btn.secondary { background: var(--kr-surface); color: var(--kr-ink); border: 1px solid var(--kr-line); }
  .kr-btn.secondary:hover { background: var(--kr-bg); }
  .kr-btn.danger { background: var(--kr-bad); }
  .kr-btn.danger:hover { background: #8b2a20; }
  .kr-btn:disabled { opacity: .55; cursor: not-allowed; }
  .kr-btn.block { width: 100%; }

  /* ===== Form fields ===== */
  .kr-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .kr-field label { font-size: 13px; color: var(--kr-ink-soft); font-weight: 600; }
  .kr-input, .kr-textarea, .kr-select, .kr-file {
    border: 1px solid var(--kr-line); border-radius: 10px;
    background: var(--kr-surface); padding: 10px 12px; font: inherit;
    color: var(--kr-ink);
  }
  .kr-textarea { min-height: 90px; resize: vertical; }
  .kr-input:focus, .kr-textarea:focus, .kr-select:focus { outline: 2px solid var(--kr-accent); outline-offset: 1px; }

  .kr-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .kr-row > * { flex: 1; min-width: 160px; }

  /* ===== Badges ===== */
  .kr-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 999px;
    background: var(--kr-line); color: var(--kr-ink);
  }
  .kr-badge.pending  { background: var(--kr-warn-l); color: var(--kr-warn); }
  .kr-badge.approved { background: var(--kr-good-l); color: var(--kr-good); }
  .kr-badge.rejected { background: var(--kr-bad-l);  color: var(--kr-bad); }
  .kr-badge.active   { background: var(--kr-good-l); color: var(--kr-good); }
  .kr-badge.disabled { background: var(--kr-bad-l);  color: var(--kr-bad); }

  /* ===== Toast / banner ===== */
  .kr-toast {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    background: var(--kr-ink); color: #fff; padding: 10px 18px;
    border-radius: 999px; font-size: 14px; box-shadow: var(--kr-shadow);
    z-index: 80; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .kr-toast.show { opacity: 1; }
  .kr-banner {
    background: var(--kr-warn-l); color: var(--kr-warn);
    padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; font-size: 14px;
  }

  /* ===== Admin tabs ===== */
  .kr-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .kr-tab {
    padding: 8px 14px; border-radius: 999px; cursor: pointer;
    background: var(--kr-surface); border: 1px solid var(--kr-line);
  }
  .kr-tab.active { background: var(--kr-accent); color: #fff; border-color: var(--kr-accent); }

  .kr-table { width: 100%; border-collapse: collapse; }
  .kr-table th, .kr-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--kr-line); text-align: left; font-size: 14px;
    vertical-align: top;
  }
  .kr-table th { color: var(--kr-ink-soft); font-weight: 600; }

  /* ===== PDF Reader ===== */
  .kr-reader-shell {
    position: fixed; inset: 0; background: #1f1b16; color: #fff; z-index: 200;
    display: flex; flex-direction: column;
  }
  .kr-reader-bar {
    background: rgba(0,0,0,.4); padding: 10px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .kr-reader-bar .kr-btn { background: rgba(255,255,255,.12); }
  .kr-reader-bar .kr-btn:hover { background: rgba(255,255,255,.22); }
  .kr-reader-stage { flex: 1; position: relative; overflow: hidden; }
  .kr-reader-canvas {
    width: 100%; height: 100%; display: block;
    user-select: none; -webkit-user-select: none;
  }
  .kr-watermark {
    position: absolute; inset: 0; pointer-events: none; z-index: 10;
    overflow: hidden;
  }
  .kr-watermark span {
    position: absolute; opacity: .15; transform: rotate(-30deg);
    color: #fff; font-weight: 700; font-size: 14px;
    text-shadow: 0 0 4px rgba(0,0,0,.3);
    white-space: nowrap;
  }
  .kr-reader-blur .kr-reader-stage { filter: blur(20px); }
  .kr-reader-warn {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,.85); color: #ffd1c9; text-align: center; padding: 20px;
    z-index: 30; font-size: 18px;
  }
  .kr-reader-blur .kr-reader-warn { display: flex; }

  /* ===== Misc ===== */
  .kr-spinner {
    width: 24px; height: 24px; border-radius: 50%;
    border: 3px solid var(--kr-line); border-top-color: var(--kr-accent);
    animation: kr-spin 0.8s linear infinite;
  }
  @keyframes kr-spin { to { transform: rotate(360deg); } }

  .kr-center { text-align: center; }
  .kr-pad { padding: 24px 0; }
  .kr-stack { display: flex; flex-direction: column; gap: 10px; }

  @media (max-width: 600px) {
    .kr-h1 { font-size: 20px; }
    .kr-card { padding: 16px; }
    main.kr-main { padding: 14px; }
  }
</style>
