  window.KR_LANG = (function () {
    try {
      const saved = localStorage.getItem('kr_lang');
      if (saved === 'kh' || saved === 'en') return saved;
    } catch (_) {}
    return 'kh';
  })();

  window.t = function (key) {
    const lang = window.KR_LANG;
    const dict = window.KR_I18N[lang] || {};
    if (dict[key]) return dict[key];
    // Fallback to English
    const en = window.KR_I18N.en[key];
    if (en) return en;
    // Never return blank — fallback to a humanised key
    return key.replace(/_/g, ' ');
  };

  window.setLang = function (lang) {
    if (lang !== 'kh' && lang !== 'en') return;
    window.KR_LANG = lang;
    try { localStorage.setItem('kr_lang', lang); } catch (_) {}
    if (typeof window.KR_RENDER === 'function') window.KR_RENDER();
  };
